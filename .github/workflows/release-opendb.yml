# SPDX-License-Identifier: Apache-2.0
# Release the `vyges-opendb` CLI (the `vyges install opendb` component).
#
# Unix-only, native per-target (the binary statically links libodb, a C++ lib — no cross).
# Produces vyges-opendb-<rust-triple>.tar.gz assets whose names + contents match what the
# vyges CLI expects: install_one() fetches `vyges-opendb-<target>.tar.gz` from
# github.com/vyges-tools/opendb/releases/latest/download/ and extracts a `vyges-opendb` binary.
#
# This repo's Cargo.toml [patch]es vyges-opendb-lib to the sibling ../vyges-tools-opendb-lib for local
# dev, so CI checks BOTH repos out as siblings under the workspace to satisfy that path (building
# against odb-sys @ main == the git dep it would otherwise use).
#
# Trigger: push a tag `v*` (publishes a Release with all four assets), or run manually to
# smoke the build (workflow_dispatch uploads artifacts only, no Release).
name: release-opendb

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create the Release + upload assets on a tag

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: vyges-tools-opendb   # the opendb checkout (sibling layout below)
    strategy:
      fail-fast: false
      matrix:
        include:
          # Supported: Linux x86_64/arm64 + Apple Silicon on macos-15 (Xcode 16 — new enough for
          # cxx, stable for fmt 11.0.2; macos-latest/Xcode 26.5 breaks fmt consteval). Intel Mac
          # (x86_64-apple-darwin) is unsupported.
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu  }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-15,         target: aarch64-apple-darwin      }
    steps:
      # Sibling layout: <ws>/vyges-tools-opendb + <ws>/vyges-tools-opendb-lib, so Cargo.toml's
      # `[patch] vyges-opendb-lib = { path = "../vyges-tools-opendb-lib" }` resolves on CI.
      - uses: actions/checkout@v4
        with:
          path: vyges-tools-opendb
      - uses: actions/checkout@v4
        with:
          repository: vyges-tools/opendb-lib
          path: vyges-tools-opendb-lib

      - name: Toolchain (Linux)
        if: runner.os == 'Linux'
        # Boost (headers) + zlib only; fmt/spdlog/abseil are built from source by libodb's build.
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ git libboost-dev zlib1g-dev

      - name: Toolchain (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake boost

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build (release; libodb built from source, static)
        # No --locked: Cargo.lock is gitignored in this repo, and the [patch] resolves
        # vyges-opendb-lib to the freshly-checked-out opendb-lib@main sibling — let Cargo resolve.
        run: cargo build --release --bin vyges-opendb

      - name: Package vyges-opendb-${{ matrix.target }}.tar.gz
        id: pkg
        run: |
          set -eu
          NAME="vyges-opendb-${{ matrix.target }}"
          STAGE="$RUNNER_TEMP/$NAME"
          mkdir -p "$STAGE"
          cp target/release/vyges-opendb "$STAGE/"
          strip "$STAGE/vyges-opendb" 2>/dev/null || strip -x "$STAGE/vyges-opendb" || true
          cp LICENSE NOTICE README.md "$STAGE/" 2>/dev/null || true
          cp THIRD_PARTY_LICENSES.md "$STAGE/" 2>/dev/null || true
          tar -C "$RUNNER_TEMP" -czf "$GITHUB_WORKSPACE/$NAME.tar.gz" "$NAME"
          ( cd "$GITHUB_WORKSPACE" && shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256" )
          echo "asset=$NAME.tar.gz" >> "$GITHUB_OUTPUT"
          echo "--- $NAME.tar.gz ---"; tar -tzf "$GITHUB_WORKSPACE/$NAME.tar.gz"; cat "$GITHUB_WORKSPACE/$NAME.tar.gz.sha256"

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.asset }}
          path: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256
          if-no-files-found: error

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256
