# SPDX-License-Identifier: Apache-2.0
# Release the `vyges-openroad` CLI (the `vyges install openroad` component).
#
# Unix-only, native per-target (the binary statically links libodb, a C++ lib — no cross).
# Produces vyges-openroad-<rust-triple>.tar.gz assets whose names + contents match what the
# vyges CLI expects: install_one() fetches `vyges-openroad-<target>.tar.gz` from
# github.com/vyges-tools/odb/releases/latest/download/ and extracts a `vyges-openroad` binary.
#
# This repo's Cargo.toml [patch]es vyges-odb-sys to the sibling ../vyges-tools-odb-sys for local
# dev, so CI checks BOTH repos out as siblings under the workspace to satisfy that path (building
# against odb-sys @ main == the git dep it would otherwise use).
#
# Trigger: push a tag `v*` (publishes a Release with all four assets), or run manually to
# smoke the build (workflow_dispatch uploads artifacts only, no Release).
name: release-openroad

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create the Release + upload assets on a tag

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: vyges-tools-odb   # the odb checkout (sibling layout below)
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux-only for now. Intel Mac (x86_64-apple-darwin) is unsupported; Apple Silicon
          # (aarch64-apple-darwin) is deferred/commented — the macOS brew step below stays in
          # place, so re-enabling is just uncommenting the matrix line.
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu  }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          # - { os: macos-latest,   target: aarch64-apple-darwin      }   # newest hosted macOS (Apple Silicon), deferred — uncomment to re-enable
    steps:
      # Sibling layout: <ws>/vyges-tools-odb + <ws>/vyges-tools-odb-sys, so Cargo.toml's
      # `[patch] vyges-odb-sys = { path = "../vyges-tools-odb-sys" }` resolves on CI.
      - uses: actions/checkout@v4
        with:
          path: vyges-tools-odb
      - uses: actions/checkout@v4
        with:
          repository: vyges-tools/odb-sys
          path: vyges-tools-odb-sys

      - name: Toolchain (Linux)
        if: runner.os == 'Linux'
        # Boost (headers) + zlib only; fmt/spdlog/abseil are built from source by libodb's build.
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ git libboost-dev zlib1g-dev

      - name: Toolchain (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake boost

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build (release; libodb built from source, static)
        # No --locked: Cargo.lock is gitignored in this repo, and the [patch] resolves
        # vyges-odb-sys to the freshly-checked-out odb-sys@main sibling — let Cargo resolve.
        run: cargo build --release --bin vyges-openroad

      - name: Package vyges-openroad-${{ matrix.target }}.tar.gz
        id: pkg
        run: |
          set -eu
          NAME="vyges-openroad-${{ matrix.target }}"
          STAGE="$RUNNER_TEMP/$NAME"
          mkdir -p "$STAGE"
          cp target/release/vyges-openroad "$STAGE/"
          strip "$STAGE/vyges-openroad" 2>/dev/null || strip -x "$STAGE/vyges-openroad" || true
          cp LICENSE NOTICE README.md "$STAGE/" 2>/dev/null || true
          cp THIRD_PARTY_LICENSES.md "$STAGE/" 2>/dev/null || true
          tar -C "$RUNNER_TEMP" -czf "$GITHUB_WORKSPACE/$NAME.tar.gz" "$NAME"
          ( cd "$GITHUB_WORKSPACE" && shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256" )
          echo "asset=$NAME.tar.gz" >> "$GITHUB_OUTPUT"
          echo "--- $NAME.tar.gz ---"; tar -tzf "$GITHUB_WORKSPACE/$NAME.tar.gz"; cat "$GITHUB_WORKSPACE/$NAME.tar.gz.sha256"

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.asset }}
          path: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256
          if-no-files-found: error

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256
